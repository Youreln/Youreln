<!DOCTYPE html>
<html>
<head>
  <title>成果汇报</title>
  <style>
    @keyframes fadeIn {
      0% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }
    
    body {
      animation: fadeIn 2s ease-in-out;
    }
    
    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url(https://pic1.imgdb.cn/item/6468b9e4e03e90d874288273.jpg);
      background-size: cover;
      background-position: center;
      opacity: 0;
      animation: fadeIn 2s ease-in-out;
    }
    
    iframe {
      display: block;
      border: none;
      width: 100%;
      height: 100%;
    }
    
    .iframe-container {
      position: relative;
      overflow: hidden;
      padding-top: 56.25%; /* 16:9 aspect ratio */
    }
    
    .iframe-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    /* 媒体查询，调整样式以适应手机竖屏 */
    @media (max-width: 480px) {
      .iframe-container {
        padding-top: 75%; /* 调整高度比例以适应竖屏比例 */
      }
    }
  </style>
</head>
<body>
  <div class="bg-image"></div>
  
  <div style="text-align:center;">
    <iframe src="//player.bilibili.com/player.html?aid=619342230&bvid=BV1e84y1m7gN&cid=1290030979&p=1" scrolling="no" frameborder="no" allowfullscreen="true"></iframe>
  </div>
  
  <div class="iframe-container">
    <iframe src="https://m7gerjo24q.feishu.cn/docx/F2zXdm2lnoo6xqxKfGGcKz4KnQh?from=from_copylink"></iframe>
  </div>

</body>
</html>
